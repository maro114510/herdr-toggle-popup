name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - name: Run go vet
        run: go vet ./...
      - name: Run go test
        run: go test ./...

  github-release:
    name: GitHub Release
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Verify tag matches manifest version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -eu
          VERSION="${TAG_NAME#v}"
          MANIFEST_VERSION="$(sed -nE 's/^[[:space:]]*version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' herdr-plugin.toml | head -n 1)"
          test "${MANIFEST_VERSION}" = "${VERSION}" || { echo "herdr-plugin.toml has version ${MANIFEST_VERSION}, expected ${VERSION}"; exit 1; }

      - name: Build cross-compiled binaries
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -eu
          VERSION="${TAG_NAME#v}"
          mkdir -p dist
          for target in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64; do
            goos="${target%/*}"
            goarch="${target#*/}"
            echo "Building ${goos}/${goarch}"
            CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" go build \
              -trimpath \
              -ldflags "-s -w -X main.version=${VERSION}" \
              -o "dist/toggle-popup_${goos}_${goarch}" .
          done

      - name: Smoke test linux/amd64 binary
        run: |
          set -eu
          ./dist/toggle-popup_linux_amd64 version

      - name: Generate checksums
        run: |
          set -eu
          (cd dist && sha256sum toggle-popup_* > checksums.txt)

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "${TAG_NAME}" --title "${TAG_NAME}" --generate-notes --verify-tag \
            dist/toggle-popup_darwin_amd64 \
            dist/toggle-popup_darwin_arm64 \
            dist/toggle-popup_linux_amd64 \
            dist/toggle-popup_linux_arm64 \
            dist/checksums.txt
