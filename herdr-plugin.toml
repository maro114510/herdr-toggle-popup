id = "maro114510.toggle-popup"
name = "Toggle Popup"
version = "0.2.1"
min_herdr_version = "0.7.0"
platforms = ["macos", "linux"]

[[build]]
command = ["sh", "scripts/build.sh"]

[[actions]]
id = "toggle-shell"
title = "Toggle popup shell"
contexts = ["workspace", "tab", "pane"]
command = ["./bin/toggle-popup", "toggle", "shell"]

[[panes]]
id = "shell"
title = "Popup Shell"
placement = "overlay"
command = ["sh", "-c", "exec \"$HERDR_PLUGIN_ROOT/bin/toggle-popup\" popup-shell shell"]

[[events]]
on = "pane.closed"
command = ["./bin/toggle-popup", "on-pane-closed"]
